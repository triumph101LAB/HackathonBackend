name: Keep Backend Alive

on:
  schedule:
    - cron: "* * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping PDI Backend
        run: |
          URL="${{ secrets.RENDER_BACKEND_URL }}/health"
          echo "Pinging: $URL"

          # Try up to 3 times with 20s between retries
          # --max-time 55: wait up to 55s per attempt (covers full cold start)
          # --retry 3: curl-level retries on connection failure
          # --retry-delay 10: wait 10s between curl retries
          # || true: never let curl exit code fail the workflow

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 55 \
            --retry 3 \
            --retry-delay 10 \
            --retry-all-errors \
            "$URL") || true

          echo "Response: $RESPONSE"

          if [ "$RESPONSE" = "200" ]; then
            echo "✓ Backend alive"
          else
            echo "⚠ Got $RESPONSE — backend may be waking up, next ping will confirm"
          fi

          # Always exit 0 — never fail this workflow
          exit 0
